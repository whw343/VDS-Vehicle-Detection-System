<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>套牌车稽查系统 - 基于车辆特征分析</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary: #1a5276;
            --success: #27ae60;
            --danger: #e74c3c;
            --warning: #f39c12;
            --bg: #f0f4f8;
        }
        * { transition: all 0.2s ease; }
        body { background: var(--bg); font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
        .navbar { background: linear-gradient(135deg, #1a5276, #2980b9) !important; }
        .card { border: none; border-radius: 14px; box-shadow: 0 2px 16px rgba(0,0,0,0.06); }
        .card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.10); }
        .upload-zone {
            border: 2px dashed #2980b9; border-radius: 14px; padding: 50px 20px;
            text-align: center; background: #eaf2f8; cursor: pointer; min-height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .upload-zone:hover, .upload-zone.dragover { background: #d4e6f1; border-color: #1a5276; }
        .upload-zone img { max-height: 180px; border-radius: 8px; }
        .step-card { border-radius: 14px; padding: 20px; text-align: center; color: #fff; }
        .step-1 { background: linear-gradient(135deg, #3498db, #2980b9); }
        .step-2 { background: linear-gradient(135deg, #27ae60, #229954); }
        .step-3 { background: linear-gradient(135deg, #e67e22, #d35400); }
        .result-status { font-size: 1.4rem; font-weight: 700; padding: 15px; border-radius: 10px; }
        .status-normal { background: #d4efdf; color: #1e8449; }
        .status-suspicious { background: #fadbd8; color: #c0392b; }
        .status-unknown { background: #fef9e7; color: #b7950b; }
        .feature-badge {
            display: inline-block; padding: 4px 14px; border-radius: 20px;
            font-size: 0.9rem; font-weight: 600; margin: 3px;
        }
        .badge-plate { background: #d4e6f1; color: #1a5276; }
        .badge-brand { background: #d5f5e3; color: #1e8449; }
        .badge-color { background: #fdebd0; color: #935116; }
        .badge-type { background: #e8daef; color: #6c3483; }
        .score-bar {
            height: 10px; border-radius: 5px; background: #e9ecef; overflow: hidden;
        }
        .score-fill {
            height: 100%; border-radius: 5px; transition: width 0.8s ease;
        }
        .score-high { background: #27ae60; }
        .score-mid { background: #f39c12; }
        .score-low { background: #e74c3c; }
        .table-feature th { width: 110px; color: #7f8c8d; font-weight: 500; }
        .no-vehicle { font-size: 3rem; opacity: 0.5; }
        footer { border-top: 1px solid #dee2e6; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .preview-container { position: relative; }
        .preview-container .remove-btn {
            position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
            border-radius: 50%; background: rgba(0,0,0,0.5); color: #fff; border: none;
            font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚗 套牌车稽查系统</span>
            <span class="navbar-text">v0.2 | 广西科技大学 · 软件工程</span>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>广西科技大学 · 软件工程 · 2025-2026第二学期 | AI课程项目</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
