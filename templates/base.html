<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>套牌车稽查系统 - 基于车辆特征分析</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f5f7fa; font-family: 'Microsoft YaHei', sans-serif; }
        .navbar { background: linear-gradient(135deg, #1a5276, #2980b9); }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .upload-zone {
            border: 2px dashed #2980b9; border-radius: 12px; padding: 40px;
            text-align: center; background: #eaf2f8; cursor: pointer;
            transition: all 0.3s;
        }
        .upload-zone:hover { background: #d4e6f1; border-color: #1a5276; }
        .result-card { border-left: 4px solid; }
        .result-normal { border-color: #27ae60; }
        .result-suspicious { border-color: #e74c3c; }
        .result-unknown { border-color: #f39c12; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚗 套牌车稽查系统</span>
            <span class="navbar-text text-white-50">基于车辆特征分析 | 人工智能基础课程</span>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center text-muted py-4 mt-5">
        <small>广西科技大学 · 软件工程 · 2025-2026第二学期</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
